<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#2d5a3d">
<title>Mi Agenda</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:opsz,wght@9..40,400;9..40,500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --ink:#1a1a1a;--ink2:#555;--ink3:#999;
  --surface:#ffffff;--surface2:#f5f3ef;--surface3:#ede9e0;
  --accent:#2d5a3d;--accent2:#4a8c64;--accent-light:#e8f0eb;
  --warn:#c0622a;--warn-light:#faeee5;
  --info:#1e4d8c;--info-light:#e6edf7;
  --danger:#a32d2d;--danger-light:#fcebeb;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);
  --r:12px;--font-h:'DM Serif Display',serif;--font-b:'DM Sans',sans-serif;
}
@media(prefers-color-scheme:dark){:root{
  --ink:#f0ece4;--ink2:#b0a898;--ink3:#706860;
  --surface:#1c1b18;--surface2:#252420;--surface3:#2e2c27;
  --accent:#6ab587;--accent2:#4a8c64;--accent-light:#1a2e22;
  --warn:#e07a48;--warn-light:#2e1a0e;
  --info:#5b8fd4;--info-light:#0e1d30;
  --danger:#e24b4a;--danger-light:#2a0f0f;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);
}}

html,body{height:100%;background:var(--surface2);color:var(--ink);font-family:var(--font-b);font-size:16px;overflow-x:hidden}
body{display:flex;flex-direction:column;max-width:430px;margin:0 auto}

/* HEADER */
.hdr{background:var(--surface);padding:1.1rem 1.25rem 0;border-bottom:.5px solid var(--border);position:sticky;top:0;z-index:50}
.hdr-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:.85rem}
.hdr-title{font-family:var(--font-h);font-size:22px;letter-spacing:-.3px}
.hdr-date{font-size:12px;color:var(--ink3)}
.hdr-date b{color:var(--accent);font-weight:500}
.nav{display:flex;gap:2px}
.nav-btn{flex:1;padding:8px 2px 10px;border:none;background:transparent;font-family:var(--font-b);font-size:11px;font-weight:500;color:var(--ink3);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;border-bottom:2px solid transparent;transition:all .15s}
.nav-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.nav-icon{font-size:18px;line-height:1}

/* CONTENT */
.content{flex:1;padding:1rem 1rem 5rem;overflow-y:auto}
.section{display:none}.section.active{display:block}

/* LOADER */
.loader{text-align:center;padding:2.5rem 1rem;color:var(--ink3);font-size:14px}
.spinner{width:28px;height:28px;border:2px solid var(--surface3);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}

/* TOAST */
#toast{position:fixed;bottom:5rem;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--surface);font-size:13px;padding:8px 18px;border-radius:20px;opacity:0;transition:all .3s;pointer-events:none;z-index:200;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* STATS */
.stat-row{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-bottom:1rem}
.stat-card{background:var(--surface3);border-radius:10px;padding:.75rem;text-align:center}
.stat-num{font-size:22px;font-weight:500;color:var(--ink)}
.stat-lbl{font-size:11px;color:var(--ink3);margin-top:2px}

/* PROGRESS */
.prog-wrap{margin-bottom:1rem}
.prog-label{display:flex;justify-content:space-between;font-size:12px;color:var(--ink3);margin-bottom:5px}
.prog-bar{height:4px;background:var(--surface3);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;background:var(--accent);border-radius:4px;transition:width .4s}

/* PILLS */
.pills{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap}
.pill{font-size:12px;padding:5px 12px;border-radius:20px;border:.5px solid var(--border);background:var(--surface);color:var(--ink2);cursor:pointer;font-family:var(--font-b);transition:all .12s}
.pill.active{background:var(--accent);color:white;border-color:var(--accent)}

/* CARD */
.card{background:var(--surface);border-radius:var(--r);border:.5px solid var(--border);padding:1rem 1.25rem;margin-bottom:.75rem}

/* TASK ITEM */
.task-item{display:flex;align-items:flex-start;gap:12px;padding:.7rem 0;border-bottom:.5px solid var(--border)}
.task-item:last-child{border-bottom:none;padding-bottom:0}
.task-check{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border2);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;margin-top:1px;background:transparent}
.task-check.done{background:var(--accent);border-color:var(--accent);color:white;font-size:12px}
.task-text{flex:1;min-width:0}
.task-title{font-size:14px;font-weight:500;color:var(--ink);line-height:1.4;word-break:break-word}
.task-title.done{text-decoration:line-through;color:var(--ink3);font-weight:400}
.task-meta{font-size:12px;color:var(--ink3);margin-top:3px;display:flex;align-items:center;gap:6px}
.task-del{background:none;border:none;cursor:pointer;color:var(--ink3);font-size:16px;padding:0 4px;line-height:1;opacity:.5;transition:opacity .15s}
.task-del:hover{opacity:1;color:var(--danger)}
.tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500}
.tag-trabajo{background:var(--info-light);color:var(--info)}
.tag-personal{background:var(--accent-light);color:var(--accent)}
.tag-sonantes{background:var(--warn-light);color:var(--warn)}

/* EVENT */
.ev-day-label{font-size:11px;font-weight:500;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px;margin:1rem 0 .4rem}
.ev-day-label:first-child{margin-top:0}
.ev-item{display:flex;gap:12px;align-items:stretch;background:var(--surface);border-radius:var(--r);border:.5px solid var(--border);padding:.75rem 1rem;margin-bottom:.5rem}
.ev-line{width:3px;border-radius:4px;flex-shrink:0}
.ev-body{flex:1;min-width:0}
.ev-title{font-size:14px;font-weight:500;color:var(--ink)}
.ev-time{font-size:12px;color:var(--ink3);margin-top:2px}
.ev-del{background:none;border:none;cursor:pointer;color:var(--ink3);font-size:16px;opacity:.4;transition:opacity .15s;align-self:center;padding:0 4px}
.ev-del:hover{opacity:1;color:var(--danger)}

/* NOTE */
.note-card{background:var(--surface);border-radius:var(--r);border:.5px solid var(--border);padding:1rem 1.25rem;margin-bottom:.75rem;cursor:pointer;transition:border-color .15s}
.note-card:hover{border-color:var(--border2)}
.note-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.note-title{font-size:14px;font-weight:500;color:var(--ink);margin-bottom:4px}
.note-preview{font-size:13px;color:var(--ink2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.note-date{font-size:11px;color:var(--ink3);margin-top:6px}
.note-del{background:none;border:none;cursor:pointer;color:var(--ink3);font-size:16px;opacity:.4;flex-shrink:0;padding:0;transition:opacity .15s}
.note-del:hover{opacity:1;color:var(--danger)}

/* CONTACT */
.contact-item{display:flex;align-items:center;gap:12px;padding:.7rem 0;border-bottom:.5px solid var(--border)}
.contact-item:last-child{border-bottom:none}
.contact-av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;flex-shrink:0}
.contact-info{flex:1;min-width:0}
.contact-name{font-size:14px;font-weight:500;color:var(--ink)}
.contact-role{font-size:12px;color:var(--ink3)}
.contact-del{background:none;border:none;cursor:pointer;color:var(--ink3);font-size:16px;opacity:.4;padding:0 4px;transition:opacity .15s}
.contact-del:hover{opacity:1;color:var(--danger)}
.sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
.sec-title{font-family:var(--font-h);font-size:18px}
.sec-count{font-size:12px;color:var(--ink3);background:var(--surface3);padding:3px 10px;border-radius:20px}

/* FAB */
.fab{position:fixed;bottom:1.5rem;right:1.25rem;width:54px;height:54px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:26px;color:white;box-shadow:0 2px 16px rgba(0,0,0,.25);transition:transform .15s;z-index:100}
.fab:active{transform:scale(.92)}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:150;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-bg.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border-radius:20px 20px 0 0;padding:1.5rem 1.25rem 2rem;width:100%;max-width:430px;transform:translateY(30px);transition:transform .25s;max-height:90vh;overflow-y:auto}
.modal-bg.open .modal{transform:translateY(0)}
.modal-title{font-family:var(--font-h);font-size:20px;margin-bottom:1.25rem}
.field{margin-bottom:1rem}
.field label{display:block;font-size:12px;color:var(--ink3);margin-bottom:5px;font-weight:500;text-transform:uppercase;letter-spacing:.4px}
.field input,.field textarea,.field select{width:100%;background:var(--surface2);border:.5px solid var(--border2);border-radius:10px;padding:.65rem .85rem;font-family:var(--font-b);font-size:15px;color:var(--ink);outline:none;transition:border-color .15s}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--accent)}
.field textarea{resize:vertical;min-height:80px;line-height:1.5}
.field select option{background:var(--surface)}
.modal-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-primary{width:100%;padding:.85rem;background:var(--accent);color:white;border:none;border-radius:10px;font-family:var(--font-b);font-size:15px;font-weight:500;cursor:pointer;transition:opacity .15s}
.btn-primary:active{opacity:.85}
.btn-cancel{width:100%;padding:.75rem;background:transparent;color:var(--ink3);border:.5px solid var(--border2);border-radius:10px;font-family:var(--font-b);font-size:14px;cursor:pointer;margin-top:.6rem}

/* NOTE DETAIL MODAL */
#modal-note-detail .modal{background:var(--surface)}
.note-detail-title{font-family:var(--font-h);font-size:22px;margin-bottom:.5rem;line-height:1.3}
.note-detail-date{font-size:12px;color:var(--ink3);margin-bottom:1.25rem}
.note-detail-body{font-size:15px;line-height:1.7;color:var(--ink2);white-space:pre-wrap;word-break:break-word}

/* EMPTY STATE */
.empty{text-align:center;padding:3rem 1rem;color:var(--ink3)}
.empty-icon{font-size:36px;margin-bottom:.75rem}
.empty-text{font-size:14px}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-row">
    <div style="font-family:var(--font-h);font-size:22px;letter-spacing:-.3px">Mi Agenda</div>
    <div style="font-size:12px;color:var(--ink3)">hoy, <b id="hoy-label"></b></div>
  </div>
  <nav class="nav">
    <button class="nav-btn active" data-sec="tareas" onclick="setSection('tareas',this)">
      <span class="nav-icon">✓</span>Tareas
    </button>
    <button class="nav-btn" data-sec="eventos" onclick="setSection('eventos',this)">
      <span class="nav-icon">◷</span>Eventos
    </button>
    <button class="nav-btn" data-sec="notas" onclick="setSection('notas',this)">
      <span class="nav-icon">◻</span>Notas
    </button>
    <button class="nav-btn" data-sec="contactos" onclick="setSection('contactos',this)">
      <span class="nav-icon">◎</span>Contactos
    </button>
  </nav>
</div>

<div class="content">

  <!-- TAREAS -->
  <div class="section active" id="sec-tareas">
    <div class="stat-row">
      <div class="stat-card"><div class="stat-num" id="s-pend">–</div><div class="stat-lbl">pendientes</div></div>
      <div class="stat-card"><div class="stat-num" id="s-done">–</div><div class="stat-lbl">hechas</div></div>
      <div class="stat-card"><div class="stat-num" id="s-total">–</div><div class="stat-lbl">total</div></div>
    </div>
    <div class="prog-wrap">
      <div class="prog-label"><span>Progreso de hoy</span><span id="s-pct">0%</span></div>
      <div class="prog-bar"><div class="prog-fill" id="s-fill" style="width:0%"></div></div>
    </div>
    <div class="pills">
      <button class="pill active" onclick="filterTareas('todas',this)">Todas</button>
      <button class="pill" onclick="filterTareas('trabajo',this)">Trabajo</button>
      <button class="pill" onclick="filterTareas('personal',this)">Personal</button>
      <button class="pill" onclick="filterTareas('sonantes',this)">Sonantes</button>
    </div>
    <div id="lista-tareas"><div class="loader"><div class="spinner"></div>Cargando…</div></div>
  </div>

  <!-- EVENTOS -->
  <div class="section" id="sec-eventos">
    <div id="lista-eventos"><div class="loader"><div class="spinner"></div>Cargando…</div></div>
  </div>

  <!-- NOTAS -->
  <div class="section" id="sec-notas">
    <div class="sec-header">
      <div class="sec-title">Notas</div>
      <div class="sec-count" id="cnt-notas">–</div>
    </div>
    <div id="lista-notas"><div class="loader"><div class="spinner"></div>Cargando…</div></div>
  </div>

  <!-- CONTACTOS -->
  <div class="section" id="sec-contactos">
    <div class="sec-header">
      <div class="sec-title">Contactos</div>
      <div class="sec-count" id="cnt-contactos">–</div>
    </div>
    <div class="card" id="lista-contactos"><div class="loader"><div class="spinner"></div>Cargando…</div></div>
  </div>

</div>

<button class="fab" id="fab">+</button>
<div id="toast"></div>

<!-- MODAL TAREA -->
<div class="modal-bg" id="modal-tarea">
  <div class="modal">
    <div class="modal-title">Nueva tarea</div>
    <div class="field"><label>Tarea</label><input type="text" id="t-texto" placeholder="¿Qué tenés que hacer?"></div>
    <div class="modal-row">
      <div class="field"><label>Categoría</label>
        <select id="t-cat">
          <option value="personal">Personal</option>
          <option value="trabajo">Trabajo</option>
          <option value="sonantes">Sonantes</option>
        </select>
      </div>
      <div class="field"><label>Vence</label><input type="date" id="t-fecha"></div>
    </div>
    <button class="btn-primary" id="btn-guardar-tarea">Guardar tarea</button>
    <button class="btn-cancel" onclick="closeModal('modal-tarea')">Cancelar</button>
  </div>
</div>

<!-- MODAL EVENTO -->
<div class="modal-bg" id="modal-evento">
  <div class="modal">
    <div class="modal-title">Nuevo evento</div>
    <div class="field"><label>Título</label><input type="text" id="e-titulo" placeholder="Nombre del evento"></div>
    <div class="modal-row">
      <div class="field"><label>Fecha</label><input type="date" id="e-fecha"></div>
      <div class="field"><label>Categoría</label>
        <select id="e-cat">
          <option value="personal">Personal</option>
          <option value="trabajo">Trabajo</option>
          <option value="sonantes">Sonantes</option>
        </select>
      </div>
    </div>
    <div class="modal-row">
      <div class="field"><label>Hora inicio</label><input type="time" id="e-hora-ini"></div>
      <div class="field"><label>Hora fin</label><input type="time" id="e-hora-fin"></div>
    </div>
    <div class="field"><label>Notas</label><textarea id="e-notas" placeholder="Detalles opcionales…"></textarea></div>
    <button class="btn-primary" id="btn-guardar-evento">Guardar evento</button>
    <button class="btn-cancel" onclick="closeModal('modal-evento')">Cancelar</button>
  </div>
</div>

<!-- MODAL NOTA -->
<div class="modal-bg" id="modal-nota">
  <div class="modal">
    <div class="modal-title">Nueva nota</div>
    <div class="field"><label>Título</label><input type="text" id="n-titulo" placeholder="Título de la nota"></div>
    <div class="field"><label>Contenido</label><textarea id="n-contenido" placeholder="Escribí lo que necesites…" style="min-height:120px"></textarea></div>
    <button class="btn-primary" id="btn-guardar-nota">Guardar nota</button>
    <button class="btn-cancel" onclick="closeModal('modal-nota')">Cancelar</button>
  </div>
</div>

<!-- MODAL CONTACTO -->
<div class="modal-bg" id="modal-contacto">
  <div class="modal">
    <div class="modal-title">Nuevo contacto</div>
    <div class="field"><label>Nombre</label><input type="text" id="c-nombre" placeholder="Nombre completo"></div>
    <div class="field"><label>Rol / Empresa</label><input type="text" id="c-rol" placeholder="Ej: Docente violín – Sonantes"></div>
    <div class="modal-row">
      <div class="field"><label>Teléfono</label><input type="tel" id="c-tel" placeholder="+598…"></div>
      <div class="field"><label>Email</label><input type="email" id="c-email" placeholder="correo@…"></div>
    </div>
    <div class="field"><label>Notas</label><textarea id="c-notas" placeholder="Info adicional…"></textarea></div>
    <button class="btn-primary" id="btn-guardar-contacto">Guardar contacto</button>
    <button class="btn-cancel" onclick="closeModal('modal-contacto')">Cancelar</button>
  </div>
</div>

<!-- MODAL DETALLE NOTA -->
<div class="modal-bg" id="modal-note-detail">
  <div class="modal">
    <div class="note-detail-title" id="nd-titulo"></div>
    <div class="note-detail-date" id="nd-fecha"></div>
    <div class="note-detail-body" id="nd-cuerpo"></div>
    <button class="btn-cancel" style="margin-top:1.5rem" onclick="closeModal('modal-note-detail')">Cerrar</button>
  </div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
const SB_URL  = 'https://bpbqvacuapllnzbyndog.supabase.co';
const SB_KEY  = 'sb_publishable_F16YxpB4NV8BlC4sIFK2aw_b4CY0Qbq';
const { createClient } = supabase;
const sb = createClient(SB_URL, SB_KEY);

// ── ESTADO ──────────────────────────────────────────────────────────────────
let currentSection = 'tareas';
let filtroTareas   = 'todas';
const DAYS   = ['dom','lun','mar','mié','jue','vie','sáb'];
const MONTHS = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
const MONTH_LONG = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

// ── HELPERS ─────────────────────────────────────────────────────────────────
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
function openModal(id) {
  document.getElementById(id).classList.add('open');
}
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}
function fmtFecha(isoStr) {
  if (!isoStr) return '';
  const d = new Date(isoStr + 'T12:00:00');
  return d.getDate() + ' ' + MONTHS[d.getMonth()];
}
function fmtFechaLarga(isoStr) {
  if (!isoStr) return '';
  const d = new Date(isoStr + 'T12:00:00');
  return DAYS[d.getDay()] + ' ' + d.getDate() + ' ' + MONTH_LONG[d.getMonth()];
}
function initials(name) {
  return name.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
}
const AV_COLORS = [
  ['#e8f0eb','#2d5a3d'],['#e6edf7','#1e4d8c'],['#faeee5','#c0622a'],
  ['#f5f3ef','#555'],['#fcebeb','#a32d2d']
];
function avColor(i) { return AV_COLORS[i % AV_COLORS.length]; }
const EV_COLORS = { trabajo:'#1e4d8c', personal:'#2d5a3d', sonantes:'#c0622a' };

// ── NAV ──────────────────────────────────────────────────────────────────────
function setSection(name, btn) {
  currentSection = name;
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('sec-'+name).classList.add('active');
  btn.classList.add('active');
}

// FAB
document.getElementById('fab').addEventListener('click', () => {
  const map = {tareas:'modal-tarea',eventos:'modal-evento',notas:'modal-nota',contactos:'modal-contacto'};
  openModal(map[currentSection]);
});
// close on bg click
document.querySelectorAll('.modal-bg').forEach(bg => {
  bg.addEventListener('click', e => { if(e.target===bg) bg.classList.remove('open'); });
});

// ── FECHA HOY ────────────────────────────────────────────────────────────────
(function(){
  const now = new Date();
  document.getElementById('hoy-label').textContent =
    DAYS[now.getDay()] + ' ' + now.getDate() + ' ' + MONTHS[now.getMonth()];
  // default date fields
  const iso = now.toISOString().slice(0,10);
  ['t-fecha','e-fecha'].forEach(id => { const el=document.getElementById(id); if(el) el.value=iso; });
})();

// ══════════════════════════════════════════════════════════════════════════════
// TAREAS
// ══════════════════════════════════════════════════════════════════════════════
async function loadTareas() {
  const { data, error } = await sb.from('tareas').select('*').order('created_at', {ascending:false});
  if (error) { toast('Error cargando tareas'); return; }
  renderTareas(data || []);
}
function renderTareas(data) {
  const all = data;
  const filtered = filtroTareas === 'todas' ? all : all.filter(t => t.categoria === filtroTareas);
  const done  = all.filter(t => t.done).length;
  const pend  = all.length - done;
  const pct   = all.length ? Math.round(done/all.length*100) : 0;
  document.getElementById('s-pend').textContent  = pend;
  document.getElementById('s-done').textContent  = done;
  document.getElementById('s-total').textContent = all.length;
  document.getElementById('s-pct').textContent   = pct + '%';
  document.getElementById('s-fill').style.width  = pct + '%';

  if (!filtered.length) {
    document.getElementById('lista-tareas').innerHTML =
      '<div class="empty"><div class="empty-icon">✓</div><div class="empty-text">Sin tareas en esta categoría</div></div>';
    return;
  }
  document.getElementById('lista-tareas').innerHTML =
    '<div class="card">' +
    filtered.map(t => `
      <div class="task-item">
        <div class="task-check ${t.done?'done':''}" onclick="toggleTarea('${t.id}',${t.done})" title="${t.done?'Marcar pendiente':'Marcar hecha'}">
          ${t.done ? '✓' : ''}
        </div>
        <div class="task-text">
          <div class="task-title ${t.done?'done':''}">${t.texto}</div>
          <div class="task-meta">
            <span class="tag tag-${t.categoria}">${t.categoria}</span>
            ${t.fecha_venc ? '<span>vence '+fmtFecha(t.fecha_venc)+'</span>' : ''}
          </div>
        </div>
        <button class="task-del" onclick="deleteTarea('${t.id}')" title="Eliminar">×</button>
      </div>`).join('') +
    '</div>';
  // store data for filter
  window._tareasData = data;
}

function filterTareas(cat, btn) {
  filtroTareas = cat;
  document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  if (window._tareasData) renderTareas(window._tareasData);
}

async function toggleTarea(id, currentDone) {
  const { error } = await sb.from('tareas').update({ done: !currentDone }).eq('id', id);
  if (error) { toast('Error al actualizar'); return; }
  await loadTareas();
}

async function deleteTarea(id) {
  const { error } = await sb.from('tareas').delete().eq('id', id);
  if (error) { toast('Error al eliminar'); return; }
  toast('Tarea eliminada');
  await loadTareas();
}

document.getElementById('btn-guardar-tarea').addEventListener('click', async () => {
  const texto = document.getElementById('t-texto').value.trim();
  if (!texto) { toast('Escribí el texto de la tarea'); return; }
  const { error } = await sb.from('tareas').insert({
    texto,
    categoria: document.getElementById('t-cat').value,
    fecha_venc: document.getElementById('t-fecha').value || null,
    done: false
  });
  if (error) { toast('Error al guardar'); return; }
  document.getElementById('t-texto').value = '';
  closeModal('modal-tarea');
  toast('Tarea guardada ✓');
  await loadTareas();
});

// ══════════════════════════════════════════════════════════════════════════════
// EVENTOS
// ══════════════════════════════════════════════════════════════════════════════
async function loadEventos() {
  const hoy = new Date().toISOString().slice(0,10);
  const { data, error } = await sb.from('eventos').select('*')
    .gte('fecha', hoy).order('fecha').order('hora_inicio');
  if (error) { toast('Error cargando eventos'); return; }
  renderEventos(data || []);
}
function renderEventos(data) {
  if (!data.length) {
    document.getElementById('lista-eventos').innerHTML =
      '<div class="empty"><div class="empty-icon">◷</div><div class="empty-text">Sin eventos próximos</div></div>';
    return;
  }
  // group by fecha
  const groups = {};
  data.forEach(e => {
    const lbl = e.fecha === new Date().toISOString().slice(0,10) ? 'Hoy' : fmtFechaLarga(e.fecha);
    if (!groups[lbl]) groups[lbl] = [];
    groups[lbl].push(e);
  });
  document.getElementById('lista-eventos').innerHTML = Object.entries(groups).map(([lbl, evs]) =>
    `<div class="ev-day-label">${lbl}</div>` +
    evs.map(e => {
      const hora = e.todo_el_dia ? 'todo el día' : (e.hora_inicio || '') + (e.hora_fin ? ' – '+e.hora_fin : '');
      return `<div class="ev-item">
        <div class="ev-line" style="background:${EV_COLORS[e.categoria]||'#888'}"></div>
        <div class="ev-body">
          <div class="ev-title">${e.titulo}</div>
          ${hora ? `<div class="ev-time">${hora}</div>` : ''}
          ${e.notas ? `<div class="ev-time" style="margin-top:3px">${e.notas}</div>` : ''}
        </div>
        <button class="ev-del" onclick="deleteEvento('${e.id}')" title="Eliminar">×</button>
      </div>`;
    }).join('')
  ).join('');
}

async function deleteEvento(id) {
  await sb.from('eventos').delete().eq('id', id);
  toast('Evento eliminado');
  await loadEventos();
}

document.getElementById('btn-guardar-evento').addEventListener('click', async () => {
  const titulo = document.getElementById('e-titulo').value.trim();
  const fecha  = document.getElementById('e-fecha').value;
  if (!titulo || !fecha) { toast('Título y fecha son obligatorios'); return; }
  const { error } = await sb.from('eventos').insert({
    titulo,
    fecha,
    categoria: document.getElementById('e-cat').value,
    hora_inicio: document.getElementById('e-hora-ini').value || null,
    hora_fin:    document.getElementById('e-hora-fin').value || null,
    notas:       document.getElementById('e-notas').value.trim() || null,
    todo_el_dia: !document.getElementById('e-hora-ini').value
  });
  if (error) { toast('Error al guardar'); return; }
  document.getElementById('e-titulo').value = '';
  document.getElementById('e-notas').value  = '';
  document.getElementById('e-hora-ini').value = '';
  document.getElementById('e-hora-fin').value = '';
  closeModal('modal-evento');
  toast('Evento guardado ✓');
  await loadEventos();
});

// ══════════════════════════════════════════════════════════════════════════════
// NOTAS
// ══════════════════════════════════════════════════════════════════════════════
async function loadNotas() {
  const { data, error } = await sb.from('notas').select('*').order('updated_at', {ascending:false});
  if (error) { toast('Error cargando notas'); return; }
  renderNotas(data || []);
}
function renderNotas(data) {
  document.getElementById('cnt-notas').textContent = data.length + ' nota' + (data.length!==1?'s':'');
  if (!data.length) {
    document.getElementById('lista-notas').innerHTML =
      '<div class="empty"><div class="empty-icon">◻</div><div class="empty-text">Sin notas aún</div></div>';
    return;
  }
  document.getElementById('lista-notas').innerHTML = data.map(n => `
    <div class="note-card" onclick="openNota(${JSON.stringify(n).replace(/"/g,'&quot;')})">
      <div class="note-head">
        <div class="note-title">${n.titulo}</div>
        <button class="note-del" onclick="event.stopPropagation();deleteNota('${n.id}')" title="Eliminar">×</button>
      </div>
      <div class="note-preview">${n.contenido}</div>
      <div class="note-date">${fmtFecha(n.updated_at.slice(0,10))}</div>
    </div>`).join('');
}

function openNota(n) {
  document.getElementById('nd-titulo').textContent = n.titulo;
  document.getElementById('nd-fecha').textContent  = 'Última edición: ' + fmtFechaLarga(n.updated_at.slice(0,10));
  document.getElementById('nd-cuerpo').textContent = n.contenido;
  openModal('modal-note-detail');
}

async function deleteNota(id) {
  await sb.from('notas').delete().eq('id', id);
  toast('Nota eliminada');
  await loadNotas();
}

document.getElementById('btn-guardar-nota').addEventListener('click', async () => {
  const titulo    = document.getElementById('n-titulo').value.trim();
  const contenido = document.getElementById('n-contenido').value.trim();
  if (!titulo) { toast('Escribí un título'); return; }
  const { error } = await sb.from('notas').insert({ titulo, contenido });
  if (error) { toast('Error al guardar'); return; }
  document.getElementById('n-titulo').value    = '';
  document.getElementById('n-contenido').value = '';
  closeModal('modal-nota');
  toast('Nota guardada ✓');
  await loadNotas();
});

// ══════════════════════════════════════════════════════════════════════════════
// CONTACTOS
// ══════════════════════════════════════════════════════════════════════════════
async function loadContactos() {
  const { data, error } = await sb.from('contactos').select('*').order('nombre');
  if (error) { toast('Error cargando contactos'); return; }
  renderContactos(data || []);
}
function renderContactos(data) {
  document.getElementById('cnt-contactos').textContent = data.length + ' contacto' + (data.length!==1?'s':'');
  if (!data.length) {
    document.getElementById('lista-contactos').innerHTML =
      '<div class="empty"><div class="empty-icon">◎</div><div class="empty-text">Sin contactos aún</div></div>';
    return;
  }
  document.getElementById('lista-contactos').innerHTML = data.map((c,i) => {
    const [bg,fg] = avColor(i);
    return `<div class="contact-item">
      <div class="contact-av" style="background:${bg};color:${fg}">${initials(c.nombre)}</div>
      <div class="contact-info">
        <div class="contact-name">${c.nombre}</div>
        ${c.rol ? `<div class="contact-role">${c.rol}</div>` : ''}
        ${c.telefono ? `<div class="contact-role">${c.telefono}</div>` : ''}
      </div>
      <button class="contact-del" onclick="deleteContacto('${c.id}')" title="Eliminar">×</button>
    </div>`;
  }).join('');
}

async function deleteContacto(id) {
  await sb.from('contactos').delete().eq('id', id);
  toast('Contacto eliminado');
  await loadContactos();
}

document.getElementById('btn-guardar-contacto').addEventListener('click', async () => {
  const nombre = document.getElementById('c-nombre').value.trim();
  if (!nombre) { toast('Escribí el nombre'); return; }
  const { error } = await sb.from('contactos').insert({
    nombre,
    rol:      document.getElementById('c-rol').value.trim()   || null,
    telefono: document.getElementById('c-tel').value.trim()   || null,
    email:    document.getElementById('c-email').value.trim() || null,
    notas:    document.getElementById('c-notas').value.trim() || null
  });
  if (error) { toast('Error al guardar'); return; }
  ['c-nombre','c-rol','c-tel','c-email','c-notas'].forEach(id => document.getElementById(id).value='');
  closeModal('modal-contacto');
  toast('Contacto guardado ✓');
  await loadContactos();
});

// ── INIT ─────────────────────────────────────────────────────────────────────
loadTareas();
loadEventos();
loadNotas();
loadContactos();
</script>
</body>
</html>
